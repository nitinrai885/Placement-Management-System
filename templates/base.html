<!DOCTYPE html>
<html>
<head>
    <title>Placement Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #eef2f7;
        }

        .main-container {
            max-width: 950px;
            margin: 60px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .nav-buttons a {
            margin-left: 8px;
        }
    </style>
</head>

<body>

<div class="main-container">

    <!-- Navbar -->
    <nav class="mb-4 d-flex justify-content-between align-items-center">

        <!-- Left Side Title -->
        <h5 class="fw-bold m-0">Placement Portal</h5>

        <!-- Right Side Buttons -->
        <div class="nav-buttons">

            {% if user.is_authenticated %}

                <a href="{% url 'dashboard' %}" class="btn btn-primary btn-sm">Dashboard</a>

                {% if user.studentprofile %}
                    <a href="{% url 'job_list' %}" class="btn btn-success btn-sm">Jobs</a>
                    <a href="{% url 'my_applications' %}" class="btn btn-info btn-sm">My Applications</a>
                {% elif user.companyprofile %}
                    <a href="{% url 'company_jobs' %}" class="btn btn-warning btn-sm">My Jobs</a>
                {% endif %}

                <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">Logout</a>

            {% else %}

                <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Login</a>
                <a href="{% url 'register' %}" class="btn btn-success btn-sm">Register</a>

            {% endif %}

        </div>

    </nav>

    <hr>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
