{% extends 'base.html' %}

{% block content %}

<h2>Cancel Application</h2>

<p>Are you sure you want to cancel application for:</p>

<h3>{{ application.job.title }}</h3>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Cancel</button>
    <a href="/my-applications/">No</a>
</form>

{% endblock %}
