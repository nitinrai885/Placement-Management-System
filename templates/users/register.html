{% extends 'base.html' %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card p-4 shadow-sm">
            <h3 class="text-center mb-4">Register</h3>

            <form method="POST">
                {% csrf_token %}

                <div class="row mb-3 align-items-center">
                    <label class="col-sm-4 col-form-label text-end">Username</label>
                    <div class="col-sm-8">
                        {{ form.username }}
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <label class="col-sm-4 col-form-label text-end">Email</label>
                    <div class="col-sm-8">
                        {{ form.email }}
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <label class="col-sm-4 col-form-label text-end">Password</label>
                    <div class="col-sm-8">
                        {{ form.password1 }}
                    </div>
                </div>

                <div class="row mb-3 align-items-center">
                    <label class="col-sm-4 col-form-label text-end">Confirm Password</label>
                    <div class="col-sm-8">
                        {{ form.password2 }}
                    </div>
                </div>

                <div class="row mb-4 align-items-center">
                    <label class="col-sm-4 col-form-label text-end">Role</label>
                    <div class="col-sm-8">
                        {{ form.role }}
                    </div>
                </div>

                <button type="submit" class="btn btn-success w-100">
                    Register
                </button>
            </form>

            <p class="text-center mt-3">
                Already have account?
                <a href="{% url 'login' %}">Login</a>
            </p>

        </div>

    </div>
</div>

{% endblock %}
